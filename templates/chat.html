<!DOCTYPE html>
<html>

<head>

    <title>Shadow Chat</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <div class="topbar">

        <div class="user-info">

            <h2>
                {{ username }}
            </h2>

            <span>
                Secure encrypted local messaging
            </span>

        </div>

        <!-- H2/L4 FIX: Logout via POST form instead of GET link -->
        <form method="POST" action="{{ url_for('auth.logout') }}" style="display:inline;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="logout">
                Logout
            </button>
        </form>

    </div>

    <div class="container">

        <div class="users">

            <div class="mobile-users-toggle" onclick="toggleUsers()">
                <span></span>
            </div>

            <h3>Online Users</h3>

            <div id="userList"></div>

        </div>
        <div class="chat-section">

            <div class="chat-header" id="title">
                Select User
            </div>

            <div id="chat"></div>

            <div class="input-area">

                <input id="message" placeholder="Type a message..." autocomplete="off">

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

        </div>

    </div>

    <script>
        const CURRENT_USER = "{{ username }}";
    </script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
