<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <div class="auth-container">

        <div class="auth-box">

            <h2>Login</h2>

            <!-- H1 FIX: CSRF token in form -->
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input name="username" placeholder="Username" required maxlength="30">
                <input type="password" name="password" placeholder="Password" required maxlength="128">
                <button>
                    Login
                </button>
            </form>

            <!-- H6 FIX: Generic error display -->
            {% if error %}
            <p style="color: #ff003c; margin-top: 12px; font-size: 14px;">
                {{ error }}
            </p>
            {% endif %}

            <br>

            <a href="/signup">
                Create Account
            </a>

        </div>

    </div>

</body>

</html>
