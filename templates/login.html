<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
>

</head>
<body>

<div class="auth-container">

    <div class="auth-box">

        <h2>Login</h2>

        <form method="POST">

            <input
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button>
                Login
            </button>

        </form>

        <br>

        <a href="/signup">
            Create Account
        </a>

    </div>

</div>

</body>
</html>
